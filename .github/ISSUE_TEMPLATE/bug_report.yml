name: 🐛 Bug report
description: Something in Pariksha is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! **If this is a security issue, please do not open a public issue** — see [SECURITY.md](../../SECURITY.md) for private reporting.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I click "Start exam", the page goes blank…
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Which role were you signed in as?
      options:
        - Candidate
        - Invigilator
        - Institute
        - Admin
        - Superadmin
        - Not signed in
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: Chrome 124 on Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console logs / screenshots
      description: Paste any relevant console output or attach screenshots.
